  max_parallel_jobs: null
  wrap_response: true
dashboard:
  theme: default
delegation:
  api_key: ''
  base_url: ''
  child_timeout_seconds: 600
  inherit_mcp_toolsets: true
  max_concurrent_children: 3
  max_iterations: 50
  max_spawn_depth: 1
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
